<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>DARK CITY LOGIN</title>
        <link rel="icon" href="favicon.png" />
        <link rel="stylesheet" href="style.css" />
    </head>

    <body class="login-bg">
        <div class="content">
            <h1>LOGIN</h1>

            <div class="control">
                <label>Email</label>
                <input type="email" id="email" placeholder="Enter Email" />
            </div>

            <div class="control">
                <label>Password</label>
                <input
                    type="password"
                    id="password"
                    placeholder="Enter Password"
                />
            </div>

            <button>ENTER CITY</button>

            <br /><br />
            <a href="darkcity.html" class="back-btn">← BACK</a>
        </div>
    </body>
</html>
